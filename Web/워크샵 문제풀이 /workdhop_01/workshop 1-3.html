<!DOCTYPE html>
<html lang="en">

<head>
    <title>문제3. 입력태그</title>
</head>
<form>
<body>
    <h1>Payment Form</h1>
    <hr>
    <p>Required fields are followerd by *</p>
    <h1>Contact Information</h1>
    <p>Name: * <input type="text" name="username" placeholder="smith"></p>

    <p>
    <fieldset>
    <legend>Gender *</legend>
    <input type="radio" name="gender" value="Male">Male
    <input type="radio" name="gender" value="Female">Female
    <input type="radio" name="gender" value="Other" checked>Other
    </fieldset>
    </p>

    Address: <br>
    <textarea name="message" rows="10" cols="182" placeholder="Enter the address"></textarea></p>

    <p>Email: * <input type="text" email="email" placeholder="smith@gmail.com"></p>
    <p>Pincode: * <input type="text" pincode="pincode" placeholder="123456"></p>
    <hr>
    <h1>Payment Information</h1>
     <p>Card Type: * 
     <select id="card type" name="card">  
            <option value="--select a Card Type--">--select a Card Type--</option>
            <option value="Rupay">Rupay</option>
            <option value="Mastercard">Mastercard</option>
            <option value="Visa">Visa</option>
        </select>
    </p>

     <p>Card number: * <input type="text" number="number" placeholder="1111-2222-3333-4444"></p>
     <p>Expitarion Date: * <input type="date" name="m_date">달력</p>
     <p>CVV: * <input type="text" name="cvv"></p>
</form>
</body>
