<!DOCTYPE html>
<html lang="en">
<head>
    <title>안녕하세요</title>
</head>
<body>
     <!-- table 태그 -->
     <h2>열병합</h2>
     <table border="1">
        <tr>
            <th>이름</th>
            <th colspan="2">전화번호</th> <!-- colspan= 컬럼 2개를 병합한다는 것 -->
        </tr>
        <tr>
            <td>홍길동</td>
            <td>010</td>
            <td>02</td>
        </tr>
     </table>

     <h2>행병합</h2>
     <table border="1">
        <tr>
            <th>이름</th>
            <td>홍길동</td>
        </tr>
        <tr>
            <th rowspan="2">전화번호</th> <!-- roespan 행 2개를 병합한다는 뜻 -->
            <td>010</td>
        </tr>
        <tr>
            <td>010</td>
        </tr>
     </table>




</body>
</html>
