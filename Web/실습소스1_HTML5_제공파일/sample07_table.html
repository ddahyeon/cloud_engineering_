<!DOCTYPE html>
<html lang="en">
<head>
    <title>안녕하세요</title>
</head>
<body>
     <!-- table 태그 -->

     <table border="1">
        <tr> <!-- 열을 만드는 것 -->
            <th>나이</th> <!-- th를 쓰면 볼드체로 쓰여짐 -->
            <th>성별</th>
        </tr>
        <tr>
            <td>10</td>
            <td>남</td>
        </tr>
        <tr>
            <td>11</td>
            <td>여</td>
        </tr>
     </table>


     <!-- 
     1)thead
     2)tfoot
     3)tbody 순으로 반드시 지정해야 된다. ==> html4

     html5에서는 임의로 지정 가능하다.


    -->

     <table border="1">
        <thead> <!-- 자동적으로 위에 배치함 -->
            <tr>
                <th>번호</th>
                <th>가격</th>
            </tr>
        </thead>
        <tfoot> <!-- 자동적으로 하단에 배치함 -->
            <tr>
                <td>총합</td>
                <td>10000</td>
            </tr>
        </tfoot>
        <tbody> <!-- 자동적으로 중간에 배치됨 -->
            <tr>
                <td>10</td>
                <td>9000</td>
            </tr>
            <tr>
                <td>11</td>
                <td>1000</td>
            </tr>
        </tbody>
     </table>




</body>
</html>
